<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>QR Generator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F4F0E8;
    --surface: #FDFBF7;
    --border: #D8D2C4;
    --text: #2A2520;
    --muted: #8A837A;
    --accent: #8EA9AD;
    --accent-dark: #5C7F84;
    --radius: 12px;
    --mono: 'DM Mono', monospace;
    --serif: 'DM Serif Display', serif;
  }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 3rem 1.5rem 4rem;
  }

  header { text-align: center; margin-bottom: 2.5rem; }
  header h1 {
    font-family: var(--serif);
    font-size: 2.8rem;
    font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1.1;
  }
  header p {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.5rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .field label {
    display: block;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .field input[type="text"] {
    width: 100%;
    padding: 0.65rem 0.9rem;
    font-family: var(--mono);
    font-size: 0.88rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .field input[type="text"]:focus { border-color: var(--accent); }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .color-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .color-row input[type="color"] {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 3px;
    background: var(--bg);
    cursor: pointer;
    flex-shrink: 0;
  }
  .color-row input[type="text"] {
    flex: 1;
    padding: 0.6rem 0.75rem;
    font-family: var(--mono);
    font-size: 0.88rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    text-transform: uppercase;
  }
  .color-row input[type="text"]:focus { border-color: var(--accent); }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    user-select: none;
    margin-top: 0.55rem;
  }
  .checkbox-row input[type="checkbox"] {
    width: 15px;
    height: 15px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }
  .checkbox-row span {
    font-size: 0.74rem;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
  .checkbox-row span strong {
    color: var(--accent-dark);
    font-weight: 500;
  }

  .upload-zone {
    border: 1.5px dashed var(--border);
    border-radius: 8px;
    padding: 1.2rem;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
    background: var(--bg);
  }
  .upload-zone:hover { border-color: var(--accent); background: #EEF4F5; }
  .upload-zone input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }
  .upload-zone p { font-size: 0.78rem; color: var(--muted); pointer-events: none; }
  .upload-zone p span { color: var(--accent-dark); font-weight: 500; }
  #upload-name { font-size: 0.75rem; color: var(--accent-dark); margin-top: 0.4rem; }

  .logo-size-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-top: 0.5rem;
  }
  .logo-size-row label {
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
  }
  .logo-size-row input[type="range"] { flex: 1; accent-color: var(--accent); }
  .logo-size-row span { font-size: 0.8rem; color: var(--muted); min-width: 32px; text-align: right; }

  .btn-generate {
    width: 100%;
    padding: 0.85rem;
    font-family: var(--mono);
    font-size: 0.88rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-generate:hover { background: #3D342C; }
  .btn-generate:active { transform: scale(0.99); }

  .output-section {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    margin-top: 0.5rem;
  }
  .output-section.visible { display: flex; }

  #qr-canvas {
    border-radius: 10px;
    border: 1px solid var(--border);
    display: block;
    background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
                      linear-gradient(-45deg, #ccc 25%, transparent 25%),
                      linear-gradient(45deg, transparent 75%, #ccc 75%),
                      linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 12px 12px;
    background-position: 0 0, 0 6px, 6px -6px, -6px 0px;
    background-color: #eee;
  }

  .download-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-download {
    padding: 0.65rem 1.5rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .btn-download:hover { background: var(--bg); border-color: var(--accent); color: var(--accent-dark); }

  .btn-download-large {
    padding: 0.65rem 1.5rem;
    font-family: var(--mono);
    font-size: 0.8rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: var(--accent);
    color: #fff;
    border: 1px solid var(--accent-dark);
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-download-large:hover { background: var(--accent-dark); }

  .hint { font-size: 0.72rem; color: var(--muted); text-align: center; }
  .error { font-size: 0.78rem; color: #B05050; display: none; }

  footer {
    margin-top: 3rem;
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<header>
  <h1>QR Generator</h1>
  <p>Make a code, share it instantly</p>
</header>

<div class="card">

  <div class="field">
    <label>URL or Text</label>
    <input type="text" id="qr-input" placeholder="https://..." />
  </div>

  <div class="row">
    <div class="field">
      <label>QR Color</label>
      <div class="color-row">
        <input type="color" id="color-picker" value="#8EA9AD" />
        <input type="text" id="color-hex" value="#8EA9AD" maxlength="7" />
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="map-colors" checked />
        <span><strong>MAP Colors</strong> &mdash; #8EA9AD</span>
      </label>
    </div>
    <div class="field">
      <label>Background</label>
      <div class="color-row" id="bg-color-row">
        <input type="color" id="bg-picker" value="#ffffff" />
        <input type="text" id="bg-hex" value="#FFFFFF" maxlength="7" />
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="transparent-bg" />
        <span>Transparent background</span>
      </label>
    </div>
  </div>

  <div class="field">
    <label>Center Image (optional)</label>
    <div class="upload-zone">
      <input type="file" id="logo-input" accept="image/*" />
      <p><span>Choose a file</span> or drag and drop</p>
      <p id="upload-name"></p>
    </div>
    <div class="logo-size-row">
      <label>Logo size</label>
      <input type="range" id="logo-size" min="10" max="30" value="20" step="1" />
      <span id="logo-size-val">20%</span>
    </div>
  </div>

  <p class="error" id="qr-error"></p>

  <button class="btn-generate" onclick="generate()">Generate QR Code</button>

  <div class="output-section" id="output">
    <canvas id="qr-canvas"></canvas>
    <div class="download-row">
      <button class="btn-download" onclick="downloadQR(1)">Download PNG</button>
      <button class="btn-download-large" onclick="downloadQR(4)">Download Large PNG</button>
    </div>
    <p class="hint">Or right-click the QR code above and choose "Save image as..."</p>
  </div>

</div>

<footer>Spengeman Family Personal Tool</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const PADDING = 28;
const QR_SIZE = 280;
const MAP_COLOR = '#8EA9AD';

let logoDataURL = null;

function isValidHex(h) { return /^#[0-9A-Fa-f]{6}$/.test(h); }

function syncColor(pickerId, hexId, onchange) {
  const picker = document.getElementById(pickerId);
  const hex = document.getElementById(hexId);
  picker.addEventListener('input', () => {
    hex.value = picker.value.toUpperCase();
    if (onchange) onchange(hex.value);
  });
  hex.addEventListener('input', () => {
    let v = hex.value.startsWith('#') ? hex.value : '#' + hex.value;
    if (isValidHex(v)) picker.value = v;
    hex.value = hex.value.toUpperCase();
    if (onchange) onchange(hex.value);
  });
}

syncColor('color-picker', 'color-hex', (val) => {
  document.getElementById('map-colors').checked = (val === MAP_COLOR);
});
syncColor('bg-picker', 'bg-hex', null);

document.getElementById('map-colors').addEventListener('change', function() {
  if (this.checked) {
    document.getElementById('color-picker').value = MAP_COLOR;
    document.getElementById('color-hex').value = MAP_COLOR;
  }
});

document.getElementById('transparent-bg').addEventListener('change', function() {
  const row = document.getElementById('bg-color-row');
  row.style.opacity = this.checked ? '0.35' : '1';
  row.style.pointerEvents = this.checked ? 'none' : '';
});

document.getElementById('logo-input').addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;
  document.getElementById('upload-name').textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => { logoDataURL = e.target.result; };
  reader.readAsDataURL(file);
});

document.getElementById('logo-size').addEventListener('input', function() {
  document.getElementById('logo-size-val').textContent = this.value + '%';
});

document.getElementById('qr-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});

function getColor(hexId, pickerId) {
  const h = document.getElementById(hexId).value;
  return isValidHex(h) ? h : document.getElementById(pickerId).value;
}

function renderToCanvas(scale, callback) {
  const qrSize = QR_SIZE * scale;
  const padding = PADDING * scale;
  const total = qrSize + padding * 2;

  const canvas = document.createElement('canvas');
  canvas.width = total;
  canvas.height = total;
  const ctx = canvas.getContext('2d');

  const darkColor = getColor('color-hex', 'color-picker');
  const isTransparent = document.getElementById('transparent-bg').checked;
  const lightColor = isTransparent ? '#ffffff' : getColor('bg-hex', 'bg-picker');
  const bgFill = isTransparent ? 'rgba(0,0,0,0)' : lightColor;

  const tempDiv = document.createElement('div');
  tempDiv.style.cssText = 'position:absolute;visibility:hidden;left:-9999px;';
  document.body.appendChild(tempDiv);

  try {
    new QRCode(tempDiv, {
      text: window._qrText,
      width: qrSize,
      height: qrSize,
      colorDark: darkColor,
      colorLight: lightColor,
      correctLevel: QRCode.CorrectLevel.H
    });
  } catch(e) {
    document.body.removeChild(tempDiv);
    return;
  }

  setTimeout(() => {
    const srcCanvas = tempDiv.querySelector('canvas');
    const srcImg = tempDiv.querySelector('img');

    const draw = (source) => {
      if (!isTransparent) {
        ctx.fillStyle = bgFill;
        ctx.fillRect(0, 0, total, total);
        ctx.drawImage(source, padding, padding, qrSize, qrSize);
      } else {
        // Render QR to offscreen canvas, then punch out white pixels
        const offscreen = document.createElement('canvas');
        offscreen.width = qrSize;
        offscreen.height = qrSize;
        const octx = offscreen.getContext('2d');
        octx.fillStyle = '#ffffff';
        octx.fillRect(0, 0, qrSize, qrSize);
        octx.drawImage(source, 0, 0, qrSize, qrSize);
        const imgData = octx.getImageData(0, 0, qrSize, qrSize);
        const d = imgData.data;
        for (let i = 0; i < d.length; i += 4) {
          if (d[i] > 200 && d[i+1] > 200 && d[i+2] > 200) d[i+3] = 0;
        }
        octx.putImageData(imgData, 0, 0);
        ctx.drawImage(offscreen, padding, padding, qrSize, qrSize);
      }

      if (logoDataURL) {
        const pct = parseInt(document.getElementById('logo-size').value) / 100;
        const logoSize = Math.round(qrSize * pct);
        const lx = padding + (qrSize - logoSize) / 2;
        const ly = padding + (qrSize - logoSize) / 2;
        const img = new Image();
        img.onload = () => {
          if (!isTransparent) {
            const pad = 6 * scale;
            ctx.fillStyle = bgFill;
            ctx.beginPath();
            ctx.roundRect(lx - pad, ly - pad, logoSize + pad*2, logoSize + pad*2, 6 * scale);
            ctx.fill();
          }
          ctx.drawImage(img, lx, ly, logoSize, logoSize);
          document.body.removeChild(tempDiv);
          callback(canvas);
        };
        img.src = logoDataURL;
      } else {
        document.body.removeChild(tempDiv);
        callback(canvas);
      }
    };

    if (srcCanvas) {
      draw(srcCanvas);
    } else if (srcImg && srcImg.src) {
      const img = new Image();
      img.onload = () => draw(img);
      img.src = srcImg.src;
    } else {
      document.body.removeChild(tempDiv);
    }
  }, 150);
}

function generate() {
  const val = document.getElementById('qr-input').value.trim();
  const err = document.getElementById('qr-error');
  const output = document.getElementById('output');
  const displayCanvas = document.getElementById('qr-canvas');

  err.style.display = 'none';
  output.classList.remove('visible');

  if (!val) {
    err.textContent = 'Please enter a URL or text first.';
    err.style.display = 'block';
    return;
  }

  window._qrText = val;

  renderToCanvas(1, (canvas) => {
    displayCanvas.width = canvas.width;
    displayCanvas.height = canvas.height;
    const ctx = displayCanvas.getContext('2d');
    ctx.clearRect(0, 0, displayCanvas.width, displayCanvas.height);
    ctx.drawImage(canvas, 0, 0);
    output.classList.add('visible');
  });
}

function downloadQR(scale) {
  if (!window._qrText) return;
  renderToCanvas(scale, (canvas) => {
    const a = document.createElement('a');
    a.download = scale > 1 ? 'qrcode-large.png' : 'qrcode.png';
    a.href = canvas.toDataURL('image/png');
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  });
}
</script>
</body>
</html>
